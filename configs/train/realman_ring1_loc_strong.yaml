batch_size: 16
val_batch_size: 16
num_workers: 0
max_epochs: 8
limit_train_steps: 100000
learning_rate: 0.0003
weight_decay: 0.01
gradient_clip_val: 1.0
run_validation: true
validate_every_n_steps: 2176
metric_for_best_checkpoint: val/heatmap_argmax_mae_deg
