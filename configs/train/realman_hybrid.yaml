batch_size: 2
val_batch_size: 2
num_workers: 0
max_epochs: 4
limit_train_steps: 160
learning_rate: 0.0003
weight_decay: 0.01
gradient_clip_val: 1.0
run_validation: true
validate_every_n_steps: 20
metric_for_best_checkpoint: val/loss
metric_mode: min
early_stopping_patience: 8
early_stopping_min_delta: 0.0
resume_from: null
force_resume: false
pin_memory: false
persistent_workers: false
prefetch_factor: null
log_every_n_steps: 1
save_every_n_steps: 20
output_root: ${hydra:runtime.cwd}/runs
loss_count_weight: 1.2
loss_heat_weight: 1.4
loss_heat_pos_weight: 4.0
loss_track_weight: 2.0
loss_slot_activity_pos_weight: 1.0
loss_future_count_weight: 2.0
loss_future_heat_weight: 1.6
loss_future_heat_pos_weight: 4.0
loss_future_track_weight: 1.8
loss_future_slot_activity_pos_weight: 1.0
loss_motion_weight: 1.0
