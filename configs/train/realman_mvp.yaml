batch_size: 2
val_batch_size: 2
num_workers: 0
max_epochs: 3
limit_train_steps: 120
learning_rate: 0.0003
weight_decay: 0.01
gradient_clip_val: 1.0
run_validation: true
validate_every_n_steps: 20
metric_for_best_checkpoint: val/loss
metric_mode: min
early_stopping_patience: 6
early_stopping_min_delta: 0.0
resume_from: null
force_resume: false
pin_memory: false
persistent_workers: false
prefetch_factor: null
log_every_n_steps: 1
save_every_n_steps: 20
output_root: ${hydra:runtime.cwd}/runs
